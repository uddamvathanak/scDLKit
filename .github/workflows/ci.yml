name: ci

on:
  push:
    branches: ["main"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  SCDLKIT_CACHE_DIR: ${{ github.workspace }}/.cache/scdlkit

jobs:
  linux-quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,foundation]
      - name: Ruff
        run: ruff check .
      - name: Planning structure check
        run: python scripts/check_planning_structure.py --check
      - name: Docs contract check
        run: python scripts/check_feature_docs_contracts.py --check
      - name: Mypy
        run: mypy src
      - name: Pytest
        run: pytest
      - name: Public API smoke test
        run: python scripts/smoke_taskrunner.py

  cross-platform-smoke:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install package and notebook tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,tutorials]
      - name: Pytest
        run: pytest
      - name: Public API smoke test
        run: python scripts/smoke_taskrunner.py
      - name: Script walkthrough
        run: python examples/first_run_synthetic.py
      - name: Prepare notebook artifact directory
        run: python -c "from pathlib import Path; Path('artifacts/notebooks').mkdir(parents=True, exist_ok=True)"
      - name: Execute beginner notebook
        run: python -m jupyter nbconvert --to notebook --execute examples/first_run_synthetic.ipynb --output first_run_synthetic.ci.executed.ipynb --output-dir artifacts/notebooks --ExecutePreprocessor.timeout=0
      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-${{ matrix.os }}
          path: artifacts

  linux-tutorial-smoke-classic:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install package and tutorial dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,tutorials]
      - name: Execute tutorial suite and validate artifacts
        run: python scripts/execute_tutorial_suite.py --profile ci --group classic --check
      - name: Upload tutorial artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tutorial-smoke-classic-ubuntu
          path: artifacts

  linux-tutorial-smoke-foundation-embeddings:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Restore scGPT checkpoint cache
        uses: actions/cache@v5
        with:
          path: ${{ env.SCDLKIT_CACHE_DIR }}
          key: scgpt-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
      - name: Install package and foundation tutorial dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,tutorials,foundation]
      - name: Execute foundation embedding tutorial and validate artifacts
        run: python scripts/execute_tutorial_suite.py --profile ci --only scgpt_pbmc_embeddings --check
      - name: Upload foundation embedding tutorial artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tutorial-smoke-foundation-embeddings-ubuntu
          path: artifacts

  linux-tutorial-smoke-foundation-annotation:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Restore scGPT checkpoint cache
        uses: actions/cache@v5
        with:
          path: ${{ env.SCDLKIT_CACHE_DIR }}
          key: scgpt-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
      - name: Install package and foundation tutorial dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,tutorials,foundation]
      - name: Execute foundation annotation tutorial and validate artifacts
        run: |
          python scripts/execute_tutorial_suite.py \
            --profile ci \
            --only scgpt_cell_type_annotation scgpt_dataset_specific_annotation \
            --check
      - name: Upload foundation annotation tutorial artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tutorial-smoke-foundation-annotation-ubuntu
          path: artifacts

  linux-tutorial-publication-annotation:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Restore foundation and dataset cache
        uses: actions/cache@v5
        with:
          path: ${{ env.SCDLKIT_CACHE_DIR }}
          key: scgpt-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
      - name: Install package for published tutorial validation
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,docs,tutorials,foundation]
      - name: Prepare published annotation tutorial notebook
        run: |
          python scripts/prepare_tutorial_notebooks.py \
            --execute published \
            --only scgpt_human_pancreas_annotation.ipynb \
            --skip-assets
      - name: Render tutorial status page
        run: python scripts/render_tutorial_status.py --check --allow-missing-notebooks
      - name: Upload published tutorial artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tutorial-publication-annotation-ubuntu
          path: |
            docs/_tutorials
            docs/tutorials/status.md

  foundation-smoke:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Restore scGPT checkpoint cache
        uses: actions/cache@v5
        with:
          path: ${{ env.SCDLKIT_CACHE_DIR }}
          key: scgpt-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
      - name: Install package and foundation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,foundation,tutorials]
      - name: Run foundation smoke
        run: |
          python scripts/run_foundation_smoke.py
      - name: Upload foundation smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: foundation-smoke-${{ matrix.os }}
          path: |
            artifacts/foundation_smoke

  foundation-annotation-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Restore scGPT checkpoint cache
        uses: actions/cache@v5
        with:
          path: ${{ env.SCDLKIT_CACHE_DIR }}
          key: scgpt-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
      - name: Install package and foundation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,foundation,tutorials]
      - name: Run foundation annotation metrics
        run: python scripts/run_foundation_annotation_smoke.py
      - name: Upload foundation annotation metrics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: foundation-annotation-metrics-ubuntu
          path: artifacts/foundation_annotation_smoke

  quality-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - linux-tutorial-smoke-classic
      - linux-tutorial-smoke-foundation-embeddings
      - linux-tutorial-smoke-foundation-annotation
      - foundation-smoke
      - foundation-annotation-metrics
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Restore scGPT checkpoint cache
        uses: actions/cache@v5
        with:
          path: ${{ env.SCDLKIT_CACHE_DIR }}
          key: scgpt-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
      - name: Install package and benchmark dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,tutorials,foundation]
      - name: Download classic tutorial smoke artifacts
        uses: actions/download-artifact@v8
        with:
          name: tutorial-smoke-classic-ubuntu
          path: downloaded-artifacts/classic
      - name: Download foundation embedding tutorial smoke artifacts
        uses: actions/download-artifact@v8
        with:
          name: tutorial-smoke-foundation-embeddings-ubuntu
          path: downloaded-artifacts/foundation-embeddings
      - name: Download foundation annotation tutorial smoke artifacts
        uses: actions/download-artifact@v8
        with:
          name: tutorial-smoke-foundation-annotation-ubuntu
          path: downloaded-artifacts/foundation-annotation
      - name: Download foundation annotation metrics
        uses: actions/download-artifact@v8
        with:
          name: foundation-annotation-metrics-ubuntu
          path: downloaded-artifacts/foundation-annotation-metrics
      - name: Merge tutorial summaries
        run: |
          python scripts/merge_tutorial_summaries.py \
            --inputs \
              downloaded-artifacts/classic/tutorial_validation/summary.json \
              downloaded-artifacts/foundation-embeddings/tutorial_validation/summary.json \
              downloaded-artifacts/foundation-annotation/tutorial_validation/summary.json \
            --output downloaded-artifacts/tutorial_validation/summary.json
      - name: Run quality regression suite
        run: |
          python scripts/run_quality_suite.py \
            --profile ci \
            --tutorial-summary downloaded-artifacts/tutorial_validation/summary.json \
            --foundation-annotation-metrics downloaded-artifacts/foundation-annotation-metrics/foundation_annotation_smoke/metrics.csv \
            --check \
            --require-rc
      - name: Upload quality artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: quality-regression-artifacts
          path: artifacts/quality
