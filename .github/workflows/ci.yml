name: ci

on:
  push:
    branches: ["main"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  linux-quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy src
      - name: Pytest
        run: pytest
      - name: Public API smoke test
        run: python scripts/smoke_taskrunner.py

  cross-platform-smoke:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install package and notebook tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,docs]
      - name: Pytest
        run: pytest
      - name: Public API smoke test
        run: python scripts/smoke_taskrunner.py
      - name: Script walkthrough
        run: python examples/first_run_synthetic.py
      - name: Prepare notebook artifact directory
        run: python -c "from pathlib import Path; Path('artifacts/notebooks').mkdir(parents=True, exist_ok=True)"
      - name: Execute beginner notebook
        run: python -m jupyter nbconvert --to notebook --execute examples/first_run_synthetic.ipynb --output first_run_synthetic.ci.executed.ipynb --output-dir artifacts/notebooks --ExecutePreprocessor.timeout=0
      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-${{ matrix.os }}
          path: artifacts
