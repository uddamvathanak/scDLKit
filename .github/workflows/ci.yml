name: ci

on:
  push:
    branches: ["main"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  SCDLKIT_CACHE_DIR: ${{ github.workspace }}/.cache/scdlkit

jobs:
  linux-quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,foundation]
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy src
      - name: Pytest
        run: pytest
      - name: Public API smoke test
        run: python scripts/smoke_taskrunner.py

  cross-platform-smoke:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install package and notebook tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,tutorials]
      - name: Pytest
        run: pytest
      - name: Public API smoke test
        run: python scripts/smoke_taskrunner.py
      - name: Script walkthrough
        run: python examples/first_run_synthetic.py
      - name: Prepare notebook artifact directory
        run: python -c "from pathlib import Path; Path('artifacts/notebooks').mkdir(parents=True, exist_ok=True)"
      - name: Execute beginner notebook
        run: python -m jupyter nbconvert --to notebook --execute examples/first_run_synthetic.ipynb --output first_run_synthetic.ci.executed.ipynb --output-dir artifacts/notebooks --ExecutePreprocessor.timeout=0
      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-${{ matrix.os }}
          path: artifacts

  linux-tutorial-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Restore scGPT checkpoint cache
        uses: actions/cache@v4
        with:
          path: ${{ env.SCDLKIT_CACHE_DIR }}
          key: scgpt-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
      - name: Install package and tutorial dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,tutorials,foundation]
      - name: Execute tutorial suite and validate artifacts
        run: python scripts/execute_tutorial_suite.py --profile ci --check
      - name: Upload tutorial artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tutorial-smoke-ubuntu
          path: artifacts

  foundation-smoke:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Restore scGPT checkpoint cache
        uses: actions/cache@v4
        with:
          path: ${{ env.SCDLKIT_CACHE_DIR }}
          key: scgpt-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
      - name: Install package and foundation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,foundation,tutorials]
      - name: Run foundation smoke
        run: python scripts/run_foundation_smoke.py
      - name: Upload foundation smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: foundation-smoke-${{ matrix.os }}
          path: artifacts/foundation_smoke

  quality-regression:
    runs-on: ubuntu-latest
    needs: linux-tutorial-smoke
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Restore scGPT checkpoint cache
        uses: actions/cache@v4
        with:
          path: ${{ env.SCDLKIT_CACHE_DIR }}
          key: scgpt-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
      - name: Install package and benchmark dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,tutorials,foundation]
      - name: Download tutorial smoke artifacts
        uses: actions/download-artifact@v4
        with:
          name: tutorial-smoke-ubuntu
          path: downloaded-artifacts
      - name: Run quality regression suite
        run: python scripts/run_quality_suite.py --profile ci --tutorial-summary downloaded-artifacts/tutorial_validation/summary.json --check --require-rc
      - name: Upload quality artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-regression-artifacts
          path: artifacts/quality
