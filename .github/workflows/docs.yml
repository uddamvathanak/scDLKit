name: docs

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  SCDLKIT_CACHE_DIR: ${{ github.workspace }}/.cache/scdlkit

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5
        continue-on-error: true
        with:
          token: ${{ secrets.PAGES_ENABLEMENT_TOKEN != '' && secrets.PAGES_ENABLEMENT_TOKEN || github.token }}
          enablement: ${{ secrets.PAGES_ENABLEMENT_TOKEN != '' }}
      - name: Check GitHub Pages configuration
        if: ${{ steps.pages.outcome == 'failure' }}
        run: |
          echo "::error::GitHub Pages is not enabled for this repository."
          echo "::error::Fix it in one of two ways:"
          echo "::error::1. In Settings -> Pages, set Source to GitHub Actions."
          echo "::error::2. Add a PAGES_ENABLEMENT_TOKEN secret with repo scope or Pages write permission so actions/configure-pages can enable Pages automatically."
          exit 1
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Restore scGPT checkpoint cache
        uses: actions/cache@v4
        with:
          path: ${{ env.SCDLKIT_CACHE_DIR }}
          key: scgpt-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[docs,tutorials,foundation]
      - name: Prepare tutorial notebooks
        run: python scripts/prepare_tutorial_notebooks.py --execute published
      - name: Build docs
        run: python -m sphinx -b html docs docs/_build/html -W --keep-going
      - uses: actions/upload-pages-artifact@v4
        with:
          path: docs/_build/html

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
