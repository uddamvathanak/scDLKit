name: docs

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  SCDLKIT_CACHE_DIR: ${{ github.workspace }}/.cache/scdlkit

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  prepare-classic-tutorials:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install package for classic docs tutorials
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[docs,tutorials]
      - name: Prepare classic tutorial notebooks
        run: python scripts/prepare_tutorial_notebooks.py --execute published --group classic --skip-assets
      - name: Upload classic tutorial notebooks
        uses: actions/upload-artifact@v7
        with:
          name: docs-tutorials-classic
          path: docs/_tutorials

  prepare-foundation-embedding-tutorial:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Restore scGPT checkpoint cache
        uses: actions/cache@v5
        with:
          path: ${{ env.SCDLKIT_CACHE_DIR }}
          key: scgpt-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
      - name: Install package for foundation docs tutorials
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[docs,tutorials,foundation]
      - name: Prepare foundation embedding tutorial notebook
        run: python scripts/prepare_tutorial_notebooks.py --execute published --only scgpt_pbmc_embeddings.ipynb --skip-assets
      - name: Upload foundation embedding tutorial notebook
        uses: actions/upload-artifact@v7
        with:
          name: docs-tutorials-foundation-embedding
          path: docs/_tutorials

  prepare-foundation-annotation-tutorial:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Restore scGPT checkpoint cache
        uses: actions/cache@v5
        with:
          path: ${{ env.SCDLKIT_CACHE_DIR }}
          key: scgpt-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
      - name: Install package for foundation docs tutorials
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[docs,tutorials,foundation]
      - name: Prepare foundation annotation tutorial notebook
        run: |
          python scripts/prepare_tutorial_notebooks.py \
            --execute published \
            --only scgpt_cell_type_annotation.ipynb scgpt_dataset_specific_annotation.ipynb \
            --skip-assets
      - name: Upload foundation annotation tutorial notebook
        uses: actions/upload-artifact@v7
        with:
          name: docs-tutorials-foundation-annotation
          path: docs/_tutorials

  prepare-pancreas-annotation-tutorial:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Restore foundation and dataset cache
        uses: actions/cache@v5
        with:
          path: ${{ env.SCDLKIT_CACHE_DIR }}
          key: scgpt-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
      - name: Install package for pancreas docs tutorial
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,docs,tutorials,foundation]
      - name: Prepare pancreas annotation tutorial notebook
        run: |
          python scripts/prepare_tutorial_notebooks.py \
            --execute published \
            --only scgpt_human_pancreas_annotation.ipynb \
            --skip-assets
      - name: Upload pancreas annotation tutorial notebook
        uses: actions/upload-artifact@v7
        with:
          name: docs-tutorials-pancreas-annotation
          path: docs/_tutorials

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - prepare-classic-tutorials
      - prepare-foundation-embedding-tutorial
      - prepare-foundation-annotation-tutorial
      - prepare-pancreas-annotation-tutorial
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5
        continue-on-error: true
        with:
          token: ${{ secrets.PAGES_ENABLEMENT_TOKEN != '' && secrets.PAGES_ENABLEMENT_TOKEN || github.token }}
          enablement: ${{ secrets.PAGES_ENABLEMENT_TOKEN != '' }}
      - name: Check GitHub Pages configuration
        if: ${{ steps.pages.outcome == 'failure' }}
        run: |
          echo "::error::GitHub Pages is not enabled for this repository."
          echo "::error::Fix it in one of two ways:"
          echo "::error::1. In Settings -> Pages, set Source to GitHub Actions."
          echo "::error::2. Add a PAGES_ENABLEMENT_TOKEN secret with repo scope or Pages write permission so actions/configure-pages can enable Pages automatically."
          exit 1
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[docs,foundation]
      - name: Download classic tutorial notebooks
        uses: actions/download-artifact@v8
        with:
          name: docs-tutorials-classic
          path: downloaded-docs/classic
      - name: Download foundation embedding tutorial notebook
        uses: actions/download-artifact@v8
        with:
          name: docs-tutorials-foundation-embedding
          path: downloaded-docs/foundation-embedding
      - name: Download foundation annotation tutorial notebook
        uses: actions/download-artifact@v8
        with:
          name: docs-tutorials-foundation-annotation
          path: downloaded-docs/foundation-annotation
      - name: Download pancreas annotation tutorial notebook
        uses: actions/download-artifact@v8
        with:
          name: docs-tutorials-pancreas-annotation
          path: downloaded-docs/pancreas-annotation
      - name: Combine prepared tutorial notebooks
        run: |
          python -c "from pathlib import Path; import shutil; root = Path('docs/_tutorials'); root.mkdir(parents=True, exist_ok=True); [shutil.copy2(path, root / path.name) for path in Path('downloaded-docs/classic').glob('*.ipynb')]; [shutil.copy2(path, root / path.name) for path in Path('downloaded-docs/foundation-embedding').glob('*.ipynb')]; [shutil.copy2(path, root / path.name) for path in Path('downloaded-docs/foundation-annotation').glob('*.ipynb')]; [shutil.copy2(path, root / path.name) for path in Path('downloaded-docs/pancreas-annotation').glob('*.ipynb')]"
      - name: Render tutorial execution status page
        run: python scripts/render_tutorial_status.py --check
      - name: Check docs feature contracts
        run: python scripts/check_feature_docs_contracts.py --check
      - name: Check planning structure
        run: python scripts/check_planning_structure.py --check
      - name: Build docs
        run: python -m sphinx -b html docs docs/_build/html -W --keep-going
      - uses: actions/upload-pages-artifact@v4
        with:
          path: docs/_build/html

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
