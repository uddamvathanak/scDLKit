name: release-testpypi

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to stage
        required: true
        default: main
      version:
        description: Version expected on TestPyPI
        required: true
        default: 0.1.7

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*
      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: testpypi
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  smoke:
    needs: publish
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install staged package from TestPyPI
        run: python scripts/install_from_index.py --package "scdlkit[tutorials]==${{ inputs.version }}" --index-url https://test.pypi.org/simple/
      - name: Public API smoke test
        run: python scripts/smoke_taskrunner.py
      - name: Script walkthrough
        run: python examples/first_run_synthetic.py
      - name: Prepare notebook artifact directory
        run: python -c "from pathlib import Path; Path('artifacts/notebooks').mkdir(parents=True, exist_ok=True)"
      - name: Execute beginner notebook
        run: python -m jupyter nbconvert --to notebook --execute examples/first_run_synthetic.ipynb --output first_run_synthetic.testpypi.executed.ipynb --output-dir artifacts/notebooks --ExecutePreprocessor.timeout=0
      - name: Execute Scanpy PBMC quickstart notebook
        run: python -m jupyter nbconvert --to notebook --execute examples/train_vae_pbmc.ipynb --output scanpy_pbmc_quickstart.testpypi.executed.ipynb --output-dir artifacts/notebooks --ExecutePreprocessor.timeout=0
      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: testpypi-smoke-${{ matrix.os }}
          path: artifacts

  foundation-smoke:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install staged foundation package from TestPyPI
        run: python scripts/install_from_index.py --package "scdlkit[foundation,tutorials]==${{ inputs.version }}" --index-url https://test.pypi.org/simple/
      - name: Run frozen foundation smoke
        run: python scripts/run_foundation_smoke.py
      - name: Run annotation foundation smoke
        run: python scripts/run_foundation_annotation_smoke.py
      - name: Upload foundation smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: testpypi-foundation-smoke-ubuntu
          path: artifacts
