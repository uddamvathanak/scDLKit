site_name: scDLKit
site_description: Deep learning baselines for single-cell data.
site_url: https://uddamvathanak.github.io/scDLKit/
repo_url: https://github.com/uddamvathanak/scDLKit
repo_name: uddamvathanak/scDLKit

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: cyan
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["src"]

nav:
  - Home: index.md
  - Install & Quickstart: quickstart.md
  - Tutorials: tutorials.md
  - Data Prep: data.md
  - Models: models.md
  - Training: training.md
  - Evaluation: evaluation.md
  - Visualization: visualization.md
  - Comparison: comparison.md
  - API Reference: api.md
  - Roadmap: roadmap.md
  - Contributing: contributing.md
